---
name: Build Plugin

on:
  workflow_call:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        type: string
        default: 'both'
      project-name:
        description: 'Name of the project (used to name the final plugin files). Defaults to the name of the repository if not provided.'
        required: false
        type: string
        default: ''
      release-mode:
        description: 'Config for HISE build.  (CI, Release, or "Minimal Build", etc)'
        required: false
        type: string
        default: 'CI'
      juce-branch:
        description: 'Branch of JUCE to use for the build (juce6, juce8)'
        required: false
        type: string
        default: 'juce6'
      use-ipp:
        description: 'Whether to install and use Intel IPP (only used for Windows build)'
        required: false
        type: boolean
        default: false
    secrets:
      PROD_MACOS_CERTIFICATE:
        required: true
      PROD_MACOS_CERTIFICATE_PWD:
        required: true
      PROD_MACOS_CERTIFICATE_NAME:
        required: true
      PROD_MACOS_CI_KEYCHAIN_PWD:
        required: true
      PROD_MACOS_NOTARIZATION_APPLE_ID:
        required: true
      PROD_MACOS_NOTARIZATION_TEAM_ID:
        required: true
      PROD_MACOS_NOTARIZATION_PWD:
        required: true

jobs:
  pre-build:
    runs-on: ubuntu-latest
    outputs:
      project-name: ${{ steps.project-name.outputs.result }}
    steps:
      - name: Set Project Name
        id: project-name
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            const fullRepository = "${{ github.repository }}";
            const repositoryName = fullRepository.split('/')[1];
            console.log(`Repository name: ${repositoryName}`);
            const projectName = "${{ inputs.project-name }}" == "" ? repositoryName : "${{ inputs.project-name }}";
            console.log(`Using Project Name: ${projectName}`);
            return projectName;

  build-macos:
    needs: pre-build
    if: ${{ inputs.platform == 'both' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - name: Checkout HISE repository
        uses: actions/checkout@v6
        with:
          repository: eschirle/HISE
          ref: 'develop'
          clean: true
          submodules: false
          path: HISE

      - name: Checkout JUCE submodules
        run: |
          cd HISE
          git submodule update --init --recursive
          cd JUCE
          git checkout ${{ inputs.juce-branch }}

      # TODO: Investigate caching so we don't have to build HISE binary every time
      - name: Build HISE
        working-directory: ${{ github.workspace }}/HISE/tools/auto_build/
        run: |
          # Unzip SDK
          unzip -o ${{ github.workspace }}/HISE/tools/SDK/sdk.zip -d ${{ github.workspace }}/HISE/tools/SDK/

          sh ./build_ci.sh "${{ inputs.release-mode }}" --skip-tests-and-export

      - name: Checkout Current Repository
        uses: actions/checkout@v6
        with:
          path: app
      
      # Copy everything from app folder to root
      - name: Copy app folder to root
        run: |
          cp -R ${{ github.workspace }}/app/* .

      - name: Build Plugin
        run: |
          # Copy scripts to root and run
          cp ./HISE/scripts/* .
          sh ./build.sh

      # TODO: Create a release on the repo and upload files there
      - name: Copy VST3 to root
        run: |
          cp -R Binaries/Builds/MacOSX/build/Release/*.vst3 ${{ github.workspace }}/
          cp -R Binaries/Builds/MacOSX/build/Release/*.component ${{ github.workspace }}/
          # cp -R Installer/*.app ${{ github.workspace }}/

      - name: Detect VST file
        id: detect-vst
        run: |
          # Find vst3 file within the github workspace and write the path to the output variable
          vst3_path=$(find ${{ github.workspace }} -name "*.vst3" -print -quit)
          component_path=$(find ${{ github.workspace }} -name "*.component" -print -quit)
          app_path=$(find ${{ github.workspace }} -name "*.app" -print -quit)
          echo "Found VST3 file at: $vst3_path"
          echo "vst3_path=$vst3_path" >> $GITHUB_OUTPUT
          echo "Found Component file at: $component_path"
          echo "component_path=$component_path" >> $GITHUB_OUTPUT
          echo "Found App file at: $app_path"
          echo "app_path=$app_path" >> $GITHUB_OUTPUT

      # Sign the plugin for MacOS
      - name: Codesign vst3 bundle
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
        run: |
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12

          # We need to create a new keychain, otherwise using the certificate will prompt
          # with a UI dialog asking for the certificate password, which we can't
          # use in a headless CI environment
          
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain 
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

          # We finally codesign our app bundle, specifying the Hardened runtime option
          /usr/bin/codesign --force -s "$MACOS_CERTIFICATE_NAME" --options runtime "${{ steps.detect-vst.outputs.vst3_path }}" -v
          if [ -e "${{ steps.detect-vst.outputs.component_path }}" ]; then
            echo "Codesigning Component bundle"
            /usr/bin/codesign --deep --force -s "$MACOS_CERTIFICATE_NAME" --options runtime "${{ steps.detect-vst.outputs.component_path }}" -v --timestamp
            codesign -dv --verbose=4 "${{ steps.detect-vst.outputs.component_path }}"
          fi
          # if [ -e "${{ steps.detect-vst.outputs.app_path }}" ]; then
          #   echo "Codesigning Installer app"
          #   /usr/bin/codesign --force -s "$MACOS_CERTIFICATE_NAME" --options runtime "${{ steps.detect-vst.outputs.app_path }}" -v
          # fi

      - name: Notarize VST3 bundle
        env:
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
        run: |
          # Store the notarization credentials so that we can prevent a UI password dialog
          # from blocking the CI

          echo "Create keychain profile"
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"

          # We can't notarize an app bundle directly, but we need to compress it as an archive.
          # Therefore, we create a zip file containing our app bundle, so that we can send it to the
          # notarization service

          echo "Creating temp notarization archive"
          ditto -c -k --keepParent "${{ steps.detect-vst.outputs.vst3_path }}" "notarization.zip"

          # Here we send the notarization request to the Apple's Notarization service, waiting for the result.
          # This typically takes a few seconds inside a CI environment, but it might take more depending on the App
          # characteristics. Visit the Notarization docs for more information and strategies on how to optimize it if
          # you're curious

          echo "Notarize app"
          xcrun notarytool submit "notarization.zip" --keychain-profile "notarytool-profile" --wait

          # Finally, we need to "attach the staple" to our executable, which will allow our app to be
          # validated by macOS even when an internet connection is not available.
          echo "Attach staple"
          xcrun stapler staple "${{ steps.detect-vst.outputs.vst3_path }}"

      - name: Notarize Component if found
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
        run: |
          if [ -e "${{ steps.detect-vst.outputs.component_path }}" ]; then
            echo "Notarizing Component bundle"
            ditto -c -k --keepParent "${{ steps.detect-vst.outputs.component_path }}" "component_notarization.zip"
            xcrun notarytool submit "component_notarization.zip" --keychain-profile "notarytool-profile" --wait
            xcrun stapler staple "${{ steps.detect-vst.outputs.component_path }}"
          fi

      # - name: Notarize Installer if found
      #   env:
      #     MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
      #     MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
      #     MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
      #     MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
      #   run: |
      #     if [ -e "${{ steps.detect-vst.outputs.app_path }}" ]; then
      #       echo "Notarizing Installer app"
      #       ditto -c -k --keepParent "${{ steps.detect-vst.outputs.app_path }}" "installer_notarization.zip"
      #       xcrun notarytool submit "installer_notarization.zip" --keychain-profile "notarytool-profile" --wait
      #       xcrun stapler staple "${{ steps.detect-vst.outputs.app_path }}"
      #     fi
      
      - name: Zip Everything
        run: |
          zip -r "${{ needs.pre-build.outputs.project-name }}-macos.zip" *.vst3 *.hr1 *.component *.app

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.pre-build.outputs.project-name }}-macos
          path: |
            ${{ needs.pre-build.outputs.project-name }}-macos.zip

  # TODO: Fix Windows build - currently failing due to UseIPP flag mismatch
  build-windows:
    needs: pre-build
    if: ${{ github.event.inputs.platform == 'both' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    env:
      RELEASE_MODE: "CI"
      JUCE_BRANCH: "juce6"
    steps:
      # TODO: Is this cleanup step needed?
      - name: Cleanup working dir (?)
        run: del *.* /Q /S
        shell: cmd

      - name: Checkout HISE repository
        uses: actions/checkout@v6
        with:
          repository: eschirle/HISE
          ref: 'develop'
          clean: true
          submodules: false
          path: HISE

      - name: Checkout JUCE submodules
        shell: cmd
        run: |
          cd HISE
          git submodule update --init --recursive
          cd JUCE
          git checkout ${{ env.JUCE_BRANCH }}

      - name: Install Intel IPP via pip
        run: pip3 install ipp-static

      - name: Setup MSBuild and VS Dev Environment
        uses: microsoft/setup-msbuild@v2
        with:
          #vs-prerelease: true # This did not include v145
          msbuild-architecture: x64
          
      - name: Build HISE CI
        working-directory: ${{ github.workspace }}/HISE/tools/auto_build/
        shell: cmd
        run: |
          chdir
          dir
          build_ci.bat "${{ env.RELEASE_MODE }}" --skip-tests-and-export

      - name: Checkout Current Repository
        uses: actions/checkout@v6
        with:
          path: app

      - name: Copy app folder to root
        run: Copy-Item -Path "${{ github.workspace }}/app/*" -Destination "${{ github.workspace }}" -Recurse -Force
        shell: pwsh

      - name: Build Plugin
        shell: cmd
        run: |
          copy HISE\scripts\* .
          build.bat

      - name: Copy VST3 to root
        shell: pwsh
        run: Copy-Item -Path "${{ github.workspace }}/Binaries/Builds/Windows/build/Release/*.vst3" -Destination "${{ github.workspace }}" -Recurse -Force

      - name: Upload Dyes Tonguewuhh
        uses: actions/upload-artifact@v6
        with:
          name: ${{ needs.pre-build.outputs.project-name }}-windows
          path: |
            *.hr1
            *.vst3


